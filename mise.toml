[tasks.build]
description = "Build all packages then apps"
depends = ["build:packages", "build:apps"]

[tasks."build:packages"]
description = "Build all packages in dependency order"
run = "bun run --filter './packages/*' build"

[tasks."build:apps"]
description = "Build all apps (webview first, then extension)"
depends = ["build:webview", "build:extension"]

[tasks."build:webview"]
description = "Build the welcome webview"
run = "bun run build"
dir = "apps/webview-welcome"

[tasks."build:extension"]
description = "Build the VS Code extension"
run = "bun run build"
dir = "apps/extension"

[tasks.dev]
description = "Watch mode for extension + webview in parallel"
run = "bun run --filter './apps/*' dev"

[tasks."dev:webview"]
description = "Watch mode for the welcome webview"
run = "bun run dev"
dir = "apps/webview-welcome"

[tasks."dev:extension"]
description = "Watch mode for the VS Code extension"
run = "bun run dev"
dir = "apps/extension"

[tasks.package]
description = "Package all VS Code extensions as VSIX"
run = "bun run --filter './apps/*' package"
depends = ["build"]

[tasks.clean]
description = "Clean all build artifacts"
run = "bun run --filter '*' clean"

[tasks.test]
description = "Run all tests"
run = "bun run --filter '*' test"

[tasks.lint]
description = "Lint all source files"
run = "bunx oxlint"
