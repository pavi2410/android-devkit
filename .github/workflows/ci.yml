name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-packages:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build all packages
        run: bun run --filter './packages/*' build
      - name: Upload package dists
        uses: actions/upload-artifact@v4
        with:
          name: package-dists
          path: packages/*/dist

  build-webview:
    name: Build webview
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Restore package dists
        uses: actions/download-artifact@v4
        with:
          name: package-dists
          path: packages
      - name: Build welcome webview
        run: bun run build
        working-directory: apps/webview-welcome
      - name: Upload webview dist
        uses: actions/upload-artifact@v4
        with:
          name: webview-dist
          path: apps/extension/dist/webview-welcome

  build-extension:
    name: Build extension
    runs-on: ubuntu-latest
    needs: [build-packages, build-webview]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Restore package dists
        uses: actions/download-artifact@v4
        with:
          name: package-dists
          path: packages
      - name: Restore webview dist
        uses: actions/download-artifact@v4
        with:
          name: webview-dist
          path: apps/extension/dist/webview-welcome
      - name: Build extension
        run: bun run build
        working-directory: apps/extension

  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Restore package dists
        uses: actions/download-artifact@v4
        with:
          name: package-dists
          path: packages
      - name: Type-check packages
        run: bun run --filter './packages/*' typecheck
      - name: Type-check webview
        run: bun run typecheck
        working-directory: apps/webview-welcome
      - name: Type-check extension
        run: bun run typecheck
        working-directory: apps/extension

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Lint
        run: bunx oxlint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build-packages
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Restore package dists
        uses: actions/download-artifact@v4
        with:
          name: package-dists
          path: packages
      - name: Run tests
        run: bun run --filter '*' test
