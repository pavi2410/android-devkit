name: Publish Extension

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter './packages/*' run build

      - name: Build SDK Manager webview
        run: pnpm run build
        working-directory: apps/webview-sdk-manager

      - name: Package extension
        run: pnpm run package
        working-directory: apps/extension

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: pnpm exec vsce publish --packagePath build/android-devkit-*.vsix
        working-directory: apps/extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: ${{ env.OVSX_TOKEN != '' }}
        run: pnpm exec ovsx publish build/android-devkit-*.vsix -p "$OVSX_TOKEN"
        working-directory: apps/extension
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
